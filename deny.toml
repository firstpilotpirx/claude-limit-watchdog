# cargo-deny — security, license, and architecture gate.
#   cargo deny check               # everything
#   cargo deny check advisories    # CVE check (RustSec)
#   cargo deny check licenses      # license compatibility
#   cargo deny check bans          # architecture rules + dup versions
#   cargo deny check sources       # only crates.io / known git allowed

[graph]
all-features = false

# --- Vulnerability scan against RustSec ---
[advisories]
version  = 2
db-urls  = ["https://github.com/rustsec/advisory-db"]
yanked   = "deny"
ignore   = []

# --- License whitelist for the dependency tree ---
[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
]
confidence-threshold = 0.8

# --- Architecture rules (the equivalent of ArchUnit DSL) ---
#
# Rule:  IO / presentation libraries are allowed ONLY in the crate that owns IO.
# How:   `wrappers` lists the only crates that may transitively pull in the
#        named dependency. The dependency rule `adapters → core` is enforced
#        by Cargo itself — `clw-watchdog-core` does not list
#        `clw-watchdog-adapters` in its `[dependencies]`, so the compiler
#        refuses any reverse import.
[bans]
multiple-versions = "warn"
wildcards         = "deny"
allow-wildcards   = []

# Process / signal handling — primary/lifecycle/signal only.
[[bans.deny]]
name     = "ctrlc"
wrappers = ["clw-watchdog-adapters"]

# JSONL parsing — secondary/usagelog/filesystem reads Claude Code logs.
[[bans.deny]]
name     = "serde_json"
wrappers = ["clw-watchdog-adapters"]

# YAML config — secondary/settingspersistence/yaml.
[[bans.deny]]
name     = "serde_yml"
wrappers = ["clw-watchdog-adapters"]

# Home/config dir lookup — yaml/paths.rs only.
[[bans.deny]]
name     = "dirs"
wrappers = ["clw-watchdog-adapters"]

# Interactive terminal prompts — primary/configsetup/stdio.
[[bans.deny]]
name     = "dialoguer"
wrappers = ["clw-watchdog-adapters"]

# Table rendering — secondary/userpresentation/stdio.
[[bans.deny]]
name     = "comfy-table"
wrappers = ["clw-watchdog-adapters"]

# `serde` derives belong on adapter DTOs only (handbook: Domain Purity).
# Banning it from `clw-watchdog-core` is the architectural enforcement of
# "core knows zero serialization framework".
[[bans.deny]]
name     = "serde"
wrappers = ["clw-watchdog-adapters"]

# CLI parsing — composition root only.
[[bans.deny]]
name     = "clap"
wrappers = ["clw-cli"]

# `tracing-subscriber` is a runtime concern → only the binary wires it up.
[[bans.deny]]
name     = "tracing-subscriber"
wrappers = ["clw-cli"]

# Add more as needed, e.g.:
#   [[bans.deny]] name = "tokio" wrappers = ["clw-watchdog-adapters", "clw-cli"]
#   [[bans.deny]] name = "sqlx"  wrappers = ["clw-watchdog-adapters"]

# --- Source allow-list (no random git deps) ---
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
